name: Build and publish personal NTK extension

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out personal repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Check out NTK source skeleton
        uses: actions/checkout@v4
        with:
          repository: rustedimac/extensions-source
          ref: add-ko-ntk
          path: upstream
          fetch-depth: 1

      - name: Apply personal rabbit sources
        run: |
          for extension in ntk ntktoki ntksbxh; do
            rm -rf "upstream/src/ko/$extension"
            cp -R "extension/$extension" "upstream/src/ko/$extension"
          done

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare private signing key
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$SIGNING_KEY" || { echo "Missing SIGNING_KEY secret"; exit 1; }
          test -n "$ALIAS" || { echo "Missing ALIAS secret"; exit 1; }
          test -n "$KEY_STORE_PASSWORD" || { echo "Missing KEY_STORE_PASSWORD secret"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "Missing KEY_PASSWORD secret"; exit 1; }
          printf '%s' "$SIGNING_KEY" | base64 -d > upstream/signingkey.jks

      - name: Build three signed rabbit APKs
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: upstream
        run: |
          ./gradlew \
            :src:ko:ntk:assembleRelease \
            :src:ko:ntktoki:assembleRelease \
            :src:ko:ntksbxh:assembleRelease

      - name: Inspect APK and prepare repository metadata
        shell: bash
        run: |
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          rm -rf upstream/repo/apk
          mkdir -p upstream/repo/apk
          for extension in ntk ntktoki ntksbxh; do
            APK=""
            while IFS= read -r candidate; do
              if "$APKSIGNER" verify "$candidate" >/dev/null 2>&1; then
                APK="$candidate"
                break
              fi
            done < <(find "upstream/src/ko/$extension/build/outputs/apk/release" -name '*.apk' -type f | sort)
            test -n "$APK" || { echo "No signed release APK found for $extension"; exit 1; }
            cp "$APK" upstream/repo/apk/
          done
          test "$(find upstream/repo/apk -maxdepth 1 -name '*.apk' -type f | wc -l)" -eq 3 || {
            echo "Expected exactly three signed APKs"
            exit 1
          }
          INSPECTOR_LINK="$(curl -fsSL https://api.github.com/repos/keiyoushi/extensions-inspector/releases/latest | jq -r '.assets[] | select(.name | endswith(".jar")) | .browser_download_url' | head -n 1)"
          test -n "$INSPECTOR_LINK"
          curl -fsSL "$INSPECTOR_LINK" -o upstream/Inspector.jar
          cd upstream
          java -jar Inspector.jar repo/apk output.json tmp
          python .github/scripts/create-repo.py
          test "$(jq 'length' repo/index.min.json)" -eq 3 || {
            echo "Inspector did not produce exactly three extension entries"
            exit 1
          }
          test "$(find repo/icon -maxdepth 1 -name '*.png' -type f | wc -l)" -eq 3 || {
            echo "Inspector did not produce exactly three icons"
            exit 1
          }

      - name: Build Mihon indexes
        shell: bash
        env:
          ALIAS: ${{ secrets.ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          test "$(find upstream/repo/apk -maxdepth 1 -name '*.apk' -type f | wc -l)" -eq 3
          while IFS= read -r apk; do
            "$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)/apksigner" verify "$apk"
          done < <(find upstream/repo/apk -maxdepth 1 -name '*.apk' -type f | sort)
          keytool -exportcert \
            -keystore upstream/signingkey.jks \
            -storepass "$KEY_STORE_PASSWORD" \
            -alias "$ALIAS" \
            -file upstream/signing-cert.der
          CERT_SHA="$(sha256sum upstream/signing-cert.der | awk '{ print $1 }')"
          rm upstream/signing-cert.der
          [[ "$CERT_SHA" =~ ^[0-9a-f]{64}$ ]] || { echo "Unable to read APK signing certificate SHA-256"; exit 1; }
          python -m pip install --disable-pip-version-check protobuf
          python scripts/make_repo.py upstream/repo . rami791121 rami-mihon "$CERT_SHA"

      - name: Commit generated APK and indexes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apk icon index.pb index.json index.min.json index.html repo.json
          if git diff --cached --quiet; then
            echo "Nothing changed"
          else
            git commit -m "Build personal NTK extension"
            git push origin HEAD:main
          fi
